<!doctype html>

<head>
  <meta charset="utf-8">

  <meta name="color-scheme" content="light dark">
  <title>关于 - Open Edge Speed</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/" aria-label="Open Edge Speed 首页">
      <span class="brand-mark" aria-hidden="true">↯</span>
      <span class="brand-text">Open Edge Speed</span>
      <span class="version-pill">v0.4.0-workers</span>
    </a>
    <nav class="topnav" aria-label="页面导航">
      <a href="/">测速</a>
      <button id="themeToggle" class="theme-button" type="button" aria-label="切换主题" title="切换主题"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20.2 14.6A7.6 7.6 0 0 1 9.4 3.8a8.2 8.2 0 1 0 10.8 10.8Z"/></svg></button>
    </nav>
  </header>

  <main class="doc-shell">
    <article class="panel doc-panel">
      <h1>关于 Open Edge Speed</h1>
      <p class="lead">Open Edge Speed 是一套可自部署的网络质量测速页面，用于检查当前浏览器到测速节点之间的带宽、延迟和稳定性。</p>
      <ul class="feature-list">
        <li>核心指标：下载、上传、空闲延迟、负载延迟和抖动。</li>
        <li>连接信息：客户端 IP、位置、ISP、ASN、协议、浏览器和测速节点。</li>
        <li>结果详情：点击任意结果卡片查看样本明细，并可导出 JSON 或 CSV。</li>
      </ul>
    </article>
  </main>

  <footer class="footer">
    <span>Open Edge Speed v0.4.0-workers</span>
    <a href="/">测速</a>
  </footer>
  <script src="/theme-page.js" defer></script>
